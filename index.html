<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Approval System</title>
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2234;
      --border: #1f2d45;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #4ade80;
      --red: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 24px 16px 48px;
    }
    header { text-align: center; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      background: rgba(59,130,246,0.1); color: var(--accent2);
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 20px;
      margin-bottom: 12px; border: 1px solid rgba(59,130,246,0.25);
    }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

    .container { max-width: 680px; margin: 0 auto; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted); margin-bottom: 18px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.84rem; color: var(--muted); font-weight: 500; }

    input[type="text"], input[type="number"], select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.92rem;
      padding: 9px 13px; outline: none; transition: border-color 0.2s; width: 100%;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px;
      background: var(--surface2); border: none; padding: 0; cursor: pointer; margin-top: 6px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 17px; height: 17px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 2px solid #fff;
    }
    .range-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .range-val {
      font-size: 0.82rem; font-weight: 700; color: var(--accent2);
      background: rgba(59,130,246,0.12); padding: 2px 9px; border-radius: 20px;
      display: inline-block; margin-top: 5px;
    }

    .toggle-row {
      display: flex; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .toggle-row button {
      flex: 1; padding: 9px; cursor: pointer; border: none;
      background: none; color: var(--muted); font-size: 0.88rem; font-weight: 500;
      transition: all 0.15s;
    }
    .toggle-row button.active { background: var(--accent); color: #fff; }

    .btn-primary {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.93rem; font-weight: 600;
      cursor: pointer; margin-top: 14px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.87; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      width: 100%; padding: 10px; background: none; color: var(--muted);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; cursor: pointer; margin-top: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── TERMINAL ── */
    .terminal {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 10px; overflow: hidden; margin-bottom: 16px;
      font-family: 'Fira Code', 'Courier New', monospace;
    }
    .terminal-header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 10px 16px; display: flex; align-items: center; gap: 8px;
    }
    .terminal-header span { font-size: 0.75rem; color: #8b949e; font-family: inherit; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
    .terminal-body {
      padding: 18px 20px; white-space: pre; overflow-x: auto;
      font-size: 0.86rem; line-height: 1.75; color: #c9d1d9;
    }

    /* Colour classes used in innerHTML */
    .hl-header  { color: #58a6ff; font-weight: bold; }
    .hl-key     { color: #a78bfa; }
    .hl-true    { color: #4ade80; font-weight: bold; }
    .hl-false   { color: #f87171; font-weight: bold; }
    .hl-sep     { color: #30363d; }
    .hl-name    { color: #fbbf24; font-weight: bold; }
    .hl-ok      { color: #4ade80; font-weight: bold; }
    .hl-fail    { color: #f87171; font-weight: bold; }
    .hl-row     { background: rgba(59,130,246,0.12); display: inline-block; width: 100%; }
    .hl-muted   { color: #8b949e; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">Discrete Mathematics · Propositional Logic</div>
    <h1>Loan Approval System</h1>
    <p>Evaluates loan eligibility using propositions and truth tables.</p>
  </header>

  <!-- Form -->
  <div id="formSection">
    <div class="card">
      <div class="card-title">Enter Applicant Details</div>
      <div class="form-grid">

        <div class="field" style="grid-column:1/-1;">
          <label>Applicant Name</label>
          <input type="text" id="name" placeholder="e.g. Rahul Sharma" />
        </div>

        <div class="field">
          <label>Age &nbsp;<span class="range-val" id="ageVal">30</span></label>
          <input type="range" id="age" min="18" max="70" value="30"
            oninput="document.getElementById('ageVal').textContent=this.value" />
          <div class="range-labels"><span>18</span><span>70</span></div>
        </div>

        <div class="field">
          <label>Monthly Income (Rs.)</label>
          <input type="number" id="income" placeholder="e.g. 35000" min="0" />
        </div>

        <div class="field">
          <label>Credit Score &nbsp;<span class="range-val" id="creditVal">700</span></label>
          <input type="range" id="creditScore" min="300" max="900" value="700"
            oninput="document.getElementById('creditVal').textContent=this.value" />
          <div class="range-labels"><span>300</span><span>900</span></div>
        </div>

        <div class="field">
          <label>Number of Existing Loans</label>
          <input type="number" id="existingLoans" placeholder="0" min="0" value="0" />
        </div>

        <div class="field" style="grid-column:1/-1;">
          <label>Currently Employed?</label>
          <div class="toggle-row">
            <button id="empYes" class="active" onclick="setEmployed(true)">Yes</button>
            <button id="empNo" onclick="setEmployed(false)">No</button>
          </div>
        </div>

      </div>
      <button class="btn-primary" onclick="evaluate()">Evaluate Application</button>
    </div>
  </div>

  <!-- Terminal Output -->
  <div id="results" style="display:none;">
    <div class="terminal">
      <div class="terminal-header">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        <span>loan_approval.py — output</span>
      </div>
      <div class="terminal-body" id="termOutput"></div>
    </div>
    <button class="btn-primary" onclick="checkAnother()">Check Another Applicant</button>
    <button class="btn-ghost" onclick="checkAnother()">← Back to Form</button>
  </div>
</div>

<script>
  let employed = true;
  function setEmployed(v) {
    employed = v;
    document.getElementById('empYes').classList.toggle('active', v);
    document.getElementById('empNo').classList.toggle('active', !v);
  }

  function boolStr(v) { return v ? 'True' : 'False'; }
  function boolSpan(v) { return `<span class="${v?'hl-true':'hl-false'}">${boolStr(v)}</span>`; }

  function evaluate() {
    const name   = document.getElementById('name').value.trim();
    const age    = parseInt(document.getElementById('age').value);
    const income = parseFloat(document.getElementById('income').value) || 0;
    const credit = parseInt(document.getElementById('creditScore').value);
    const loans  = parseInt(document.getElementById('existingLoans').value) || 0;

    if (!name) return alert('Please enter the applicant name.');

    // ── Propositions — mirrors Python exactly ──
    const P1 = age >= 21 && age <= 60;
    const P2 = income >= 25000;
    const P3 = credit >= 650;
    const P4 = employed;
    const P5 = loans <= 2;

    const basicOk  = P1 && P4;
    const finScore = [P2, P3, P5].filter(Boolean).length;
    const finOk    = finScore >= 2;
    const approved = basicOk && finOk;

    // ── Build terminal output ──
    const L = []; // lines (HTML strings)

    L.push(`<span class="hl-header">=== LOAN APPROVAL SYSTEM (Propositional Logic) ===</span>`);
    L.push('');
    L.push('Enter applicant details:');
    L.push(`  Applicant name : <span class="hl-name">${name}</span>`);
    L.push(`  Age            : ${age}`);
    L.push(`  Monthly income : Rs. ${income.toLocaleString('en-IN')}`);
    L.push(`  Credit score   : ${credit}`);
    L.push(`  Employed       : ${boolStr(employed)}`);
    L.push(`  Existing loans : ${loans}`);

    // Propositions section
    L.push('');
    L.push(`<span class="hl-header">--- PROPOSITIONS ---</span>`);
    L.push(`  <span class="hl-key">P1</span> (Age between 21-60)         : ${boolSpan(P1)}`);
    L.push(`  <span class="hl-key">P2</span> (Income >= Rs. 25,000)       : ${boolSpan(P2)}`);
    L.push(`  <span class="hl-key">P3</span> (Credit score >= 650)        : ${boolSpan(P3)}`);
    L.push(`  <span class="hl-key">P4</span> (Currently employed)         : ${boolSpan(P4)}`);
    L.push(`  <span class="hl-key">P5</span> (Existing loans <= 2)        : ${boolSpan(P5)}`);

    // Truth table section — identical to Python output
    L.push('');
    L.push(`<span class="hl-header">--- TRUTH TABLE (All possible cases for P2, P3, P5) ---</span>`);
    L.push('<span class="hl-muted">Assuming P1=True, P4=True (basic eligibility met)</span>');

    const col = (s, w) => s.padEnd(w);
    L.push(col('P2', 7) + col('P3', 7) + col('P5', 7) + col('Financial Score', 19) + 'Approved');
    L.push('<span class="hl-sep">' + '-'.repeat(50) + '</span>');

    for (const p2 of [true, false]) {
      for (const p3 of [true, false]) {
        for (const p5 of [true, false]) {
          const score = [p2, p3, p5].filter(Boolean).length;
          const ok    = score >= 2;
          const isMe  = p2 === P2 && p3 === P3 && p5 === P5;
          const row =
            `  ${col(boolStr(p2), 7)}${col(boolStr(p3), 7)}${col(boolStr(p5), 7)}${col(String(score), 19)}${boolStr(ok)}`;
          if (isMe) {
            L.push(`<span class="hl-row">${row}  ◄ your application</span>`);
          } else {
            L.push(row);
          }
        }
      }
    }

    // Result section
    L.push('');
    L.push(`<span class="hl-header">--- RESULT FOR ${name.toUpperCase()} ---</span>`);
    if (!basicOk) {
      L.push(`  <span class="hl-fail">Basic eligibility FAILED (Age or Employment condition not met)</span>`);
    } else {
      L.push(`  <span class="hl-ok">Basic eligibility PASSED</span>`);
      L.push(`  Financial conditions met: ${finScore} out of 3 (need at least 2)`);
    }
    L.push('');
    if (approved) {
      L.push(`  <span class="hl-ok">✓ LOAN APPROVED</span>`);
    } else {
      L.push(`  <span class="hl-fail">✗ LOAN REJECTED</span>`);
    }
    L.push('');
    L.push(`<span class="hl-muted">=== DONE ===</span>`);

    document.getElementById('termOutput').innerHTML = L.join('\n');
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function checkAnother() {
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
